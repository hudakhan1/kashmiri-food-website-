<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Announcement - Kashmiri Food</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #F8F4E9 0%, #F0E6D6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      transform: scale(0.95);
      opacity: 0;
      animation: formEntrance 0.8s ease-out forwards;
      position: relative;
    }

    .back-arrow {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 10;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .back-arrow:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-3px);
    }

    .form-header {
      background: linear-gradient(135deg, #9D2C2B 0%, #D96C2B 100%);
      padding: 2rem;
      text-align: center;
      color: white;
      position: relative;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .form-subtitle {
      font-size: 1rem;
      opacity: 0.9;
    }

    .form-content {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 500;
      color: #2C1810;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1.5rem;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: #F8F4E9;
    }

    .form-input:focus {
      outline: none;
      border-color: #9D2C2B;
      box-shadow: 0 0 0 3px rgba(157, 44, 43, 0.1);
      background: white;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #9D2C2B, #D96C2B);
      color: white;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      border: none;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 5px 15px rgba(157, 44, 43, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(157, 44, 43, 0.35);
    }

    .alert {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      animation: slideIn 0.5s ease-out;
    }

    .alert-error {
      background: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FECACA;
    }

    .alert-success {
      background: #F0FDF4;
      color: #16A34A;
      border: 1px solid #BBF7D0;
    }

    .alert-icon {
      margin-right: 0.75rem;
      font-size: 1.2rem;
    }

    /* Animations */
    @keyframes formEntrance {
      0% {
        transform: scale(0.95);
        opacity: 0;
      }
      70% {
        transform: scale(1.02);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .form-title {
        font-size: 1.8rem;
      }

      .form-content {
        padding: 1.5rem;
      }

      .back-arrow {
        top: 15px;
        left: 15px;
        width: 35px;
        height: 35px;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <!-- Back Arrow -->
    <a href="{{ url_for('admin_dashboard') }}" class="back-arrow">
      <i class="fas fa-arrow-left"></i>
    </a>

    <div class="form-header">
      <h1 class="form-title">
        <i class="fas fa-bullhorn mr-2"></i>Add Announcement
      </h1>
      <p class="form-subtitle">Share important updates with your customers</p>
    </div>

    <div class="form-content">
      {% if error %}
        <div class="alert alert-error">
          <i class="fas fa-exclamation-circle alert-icon"></i>
          {{ error }}
        </div>
      {% endif %}

      {% if success %}
        <div class="alert alert-success">
          <i class="fas fa-check-circle alert-icon"></i>
          {{ success }}
        </div>
      {% endif %}

      <form method="POST" class="space-y-6">
        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-align-left mr-2 text-kashmir-saffron"></i>
            Announcement Text
          </label>
          <input type="text" name="text" class="form-input" placeholder="Enter your announcement here..." required>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-plus-circle mr-2"></i>
          Add Announcement
        </button>
      </form>
    </div>
  </div>
</body>
</html>
