{% extends "base.html" %}
{% block content %}

<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Prevent horizontal scroll */
        width: 100%;
        box-sizing: border-box;
    }

    .complain-section {
        padding: 2rem 1rem;
        background: #F8F4E9;
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
    }

    .complain-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        padding: 2.5rem;
        max-width: 500px;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(157, 44, 43, 0.1);
        transition: all 0.4s ease;
        margin: 0 auto;
    }

    .complain-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .complain-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 700;
        text-align: center;
        color: #9D2C2B;
        margin-bottom: 1.5rem;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards;
        animation-delay: 0.3s;
    }

    .complain-icon {
        text-align: center;
        margin-bottom: 1.5rem;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards;
        animation-delay: 0.5s;
    }

    .complain-form {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards;
        animation-delay: 0.7s;
    }

    .complain-textarea {
        width: 100%;
        border: 1px solid #E5E7EB;
        border-radius: 12px;
        padding: 1.2rem;
        resize: vertical;
        min-height: 150px;
        transition: all 0.3s ease;
        background: #F8F4E9;
        box-sizing: border-box;
    }

    .complain-textarea:focus {
        outline: none;
        border-color: #9D2C2B;
        box-shadow: 0 0 0 3px rgba(157, 44, 43, 0.2);
        transform: translateY(-2px);
    }

    .complain-textarea::placeholder {
        color: #9CA3AF;
    }

    .complain-button {
        width: 100%;
        background: linear-gradient(135deg, #9D2C2B, #D96C2B);
        color: white;
        padding: 1rem 2rem;
        border-radius: 50px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(157, 44, 43, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .complain-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(157, 44, 43, 0.35);
    }

    .complain-button:active {
        transform: translateY(0);
    }

    .flash-messages {
        margin-top: 1.5rem;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 1s forwards;
        animation-delay: 0.9s;
    }

    .flash-success {
        background: rgba(72, 187, 120, 0.2);
        color: #22543D;
        padding: 1rem;
        border-radius: 12px;
        text-align: center;
        border-left: 4px solid #38A169;
    }

    .flash-error {
        background: rgba(245, 101, 101, 0.2);
        color: #742A2A;
        padding: 1rem;
        border-radius: 12px;
        text-align: center;
        border-left: 4px solid #E53E3E;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive Styles */
    @media (max-width: 640px) {
        .complain-container {
            padding: 2rem 1rem;
            margin: 0 0.5rem;
        }
        .complain-title {
            font-size: 2rem;
        }
        .complain-textarea {
            min-height: 120px;
        }
    }

    @media (max-width: 480px) {
        .complain-container {
            padding: 1.5rem 1rem;
            margin: 0 0.5rem;
        }
        .complain-title {
            font-size: 1.8rem;
        }
        .complain-textarea {
            min-height: 100px;
        }
    }
</style>

<section class="complain-section">
    <div class="complain-container">
        <div class="complain-icon">
            <i class="fas fa-comment-alt text-4xl text-kashmir-red"></i>
        </div>

        <h1 class="complain-title">Share Your complaint</h1>

        <form method="POST" action="/complain" class="complain-form space-y-4">
            <textarea name="complain" rows="5" placeholder="Please share your complaints with us..."
                      class="complain-textarea" required></textarea>

            <button type="submit" class="complain-button">
                <i class="fas fa-paper-plane"></i>Submit
            </button>
        </form>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages space-y-3">
                    {% for category, message in messages %}
                        <div class="{% if category == 'success' %}flash-success{% else %}flash-error{% endif %}">
                            <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %} mr-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
    </div>
</section>

{% endblock %}
