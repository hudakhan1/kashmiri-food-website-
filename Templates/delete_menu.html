<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kashmiri Food - Delete Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'kashmir-red': '#9D2C2B',
            'kashmir-saffron': '#D96C2B',
            'kashmir-green': '#4E7D36',
            'kashmir-dark': '#2C1810',
            'kashmir-light': '#F8F4E9',
          },
          fontFamily: {
            'display': ['Playfair Display', 'serif'],
            'body': ['Poppins', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-down': 'slideDown 0.5s ease-out forwards',
            'pulse-soft': 'pulseSoft 2s infinite',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseSoft {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .btn-transition {
      transition: all 0.3s ease;
    }
    .btn-transition:hover {
      transform: translateY(-2px);
    }
  </style>
  <script>
    function toggleForm(type) {
      document.getElementById("categoryForm").classList.add("hidden");
      document.getElementById("cardForm").classList.add("hidden");

      if (type === 'category') {
        document.getElementById("categoryForm").classList.remove("hidden");
        document.getElementById("categoryForm").classList.add("animate-slide-down");
      } else if (type === 'card') {
        document.getElementById("cardForm").classList.remove("hidden");
        document.getElementById("cardForm").classList.add("animate-slide-down");
      }
    }

    // Initialize with category form on medium+ screens
    document.addEventListener('DOMContentLoaded', function() {
      if (window.innerWidth >= 768) {
        toggleForm('category');
      }
    });
  </script>
</head>
<body class="bg-kashmir-light min-h-screen flex items-center justify-center p-4 font-body">
  <div class="w-full max-w-md md:max-w-xl bg-white shadow-xl rounded-xl p-6 md:p-8 relative animate-fade-in">

    <!-- 🔙 Back Button -->
    <a href="{{ url_for('admin_dashboard') }}"
       class="absolute left-4 top-4 text-kashmir-red hover:text-kashmir-saffron btn-transition">
      <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
    </a>

    <div class="text-center mb-6 mt-2">
      <i class="fas fa-trash-alt text-4xl mb-3 text-kashmir-red animate-pulse-soft"></i>
      <h1 class="text-2xl md:text-3xl font-display font-bold text-kashmir-dark">Delete Menu Items</h1>
      <p class="text-kashmir-dark mt-2">Manage your Kashmiri food menu</p>
    </div>

    <!-- Messages -->
    {% if error %}
      <div class="p-3 rounded-lg bg-red-100 text-red-700 mb-4 flex items-start animate-slide-down">
        <i class="fas fa-exclamation-circle mt-1 mr-2 text-red-600"></i>
        <span>{{ error }}</span>
      </div>
    {% endif %}
    {% if success %}
      <div class="p-3 rounded-lg bg-green-100 text-green-700 mb-4 flex items-start animate-slide-down">
        <i class="fas fa-check-circle mt-1 mr-2 text-green-600"></i>
        <span>{{ success }}</span>
      </div>
    {% endif %}

    <!-- Options -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center mb-6">
      <button onclick="toggleForm('category')"
              class="bg-kashmir-red text-white px-5 py-3 rounded-lg font-medium btn-transition flex items-center justify-center">
        <i class="fas fa-layer-group mr-2"></i> Delete Category
      </button>
      <button onclick="toggleForm('card')"
              class="bg-kashmir-saffron text-white px-5 py-3 rounded-lg font-medium btn-transition flex items-center justify-center">
        <i class="fas fa-utensils mr-2"></i> Delete Dish
      </button>
    </div>

    <!-- Category Delete Form -->
    <form method="POST" id="categoryForm" class="space-y-4 hidden">
      <input type="hidden" name="delete_type" value="category">
      <div>
        <label class="block font-medium text-kashmir-dark mb-2">
          <i class="fas fa-tag mr-2 text-kashmir-red"></i>Category Name:
        </label>
        <input type="text" name="category_name"
               class="border border-gray-300 p-3 w-full rounded-lg focus:ring-2 focus:ring-kashmir-red/50 focus:border-kashmir-red transition"
               placeholder="e.g., Main Course, Appetizers" required>
      </div>
      <button type="submit" class="bg-kashmir-red hover:bg-kashmir-saffron text-white px-4 py-3 rounded-lg font-medium w-full btn-transition">
        <i class="fas fa-trash mr-2"></i> Delete Category
      </button>
    </form>

    <!-- Card Delete Form -->
    <form method="POST" id="cardForm" class="space-y-4 hidden">
      <input type="hidden" name="delete_type" value="card">
      <div>
        <label class="block font-medium text-kashmir-dark mb-2">
          <i class="fas fa-tag mr-2 text-kashmir-red"></i>Category Name:
        </label>
        <input type="text" name="category_name"
               class="border border-gray-300 p-3 w-full rounded-lg focus:ring-2 focus:ring-kashmir-red/50 focus:border-kashmir-red transition"
               placeholder="e.g., Main Course, Appetizers" required>
      </div>
      <div>
        <label class="block font-medium text-kashmir-dark mb-2">
          <i class="fas fa-utensils mr-2 text-kashmir-saffron"></i>Dish Title:
        </label>
        <input type="text" name="card_title"
               class="border border-gray-300 p-3 w-full rounded-lg focus:ring-2 focus:ring-kashmir-red/50 focus:border-kashmir-red transition"
               placeholder="e.g., Rogan Josh, Gushtaba" required>
      </div>
      <button type="submit" class="bg-kashmir-saffron hover:bg-kashmir-red text-white px-4 py-3 rounded-lg font-medium w-full btn-transition">
        <i class="fas fa-trash mr-2"></i> Delete Dish
      </button>
    </form>

    <!-- Info Box -->
    <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-100 animate-fade-in">
      <div class="flex items-start">
        <i class="fas fa-info-circle text-blue-500 mt-1 mr-3"></i>
        <div>
          <h3 class="font-medium text-blue-800">Note</h3>
          <p class="text-blue-700 text-sm mt-1">Deleting a category will remove all dishes within that category. Please proceed with caution.</p>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
